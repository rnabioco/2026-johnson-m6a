[workspace]
name = "2026-johnson-m6a"
version = "0.1.0"
description = "HOTAIR nanopore m6A analysis"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10"
snakemake = ">=8.0"
snakemake-executor-plugin-slurm = "*"
samtools = "*"
minimap2 = "*"
ont-modkit = ">=0.6.1"
pandas = "*"
pyarrow = "*"
pysam = "*"
uv = "*"
# WarpDemuX dependencies
dtaidistance = "*"
scikit-learn = "*"
scipy = "*"
cython = "*"
catboost = "*"
ruptures = "*"
bottleneck = "*"

[activation]
scripts = ["aa-tRNA-seq-pipeline/scripts/setup-env.sh"]

[tasks]
setup = { cmd = "cd aa-tRNA-seq-pipeline && bash scripts/setup-tools.sh", description = "One-time setup: install dorado, models, and WarpDemuX" }
dry-run = { cmd = "snakemake -s Snakefile --configfile=config/config-hotair.yml -n", description = "Dry run HOTAIR workflow" }
run-slurm = { cmd = "snakemake -s Snakefile --configfile=config/config-hotair.yml --profile=cluster/slurm", description = "Run HOTAIR workflow on SLURM" }
